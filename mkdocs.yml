site_name: "2026 Iran War: Geopolitical & Resource Cascade Analysis"
site_description: "76-file geopolitical simulation built bottom-up from resource constraints. 18 resources, 18 countries, 20 cascade models, 5 scenarios."
site_url: https://hrishirc.github.io/iran-war-2026-analysis/
repo_url: https://github.com/hrishirc/iran-war-2026-analysis
repo_name: hrishirc/iran-war-2026-analysis

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep orange
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep orange
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - toc.integrate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - toc:
      permalink: true

docs_dir: .

nav:
